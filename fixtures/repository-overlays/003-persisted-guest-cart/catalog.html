<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demo Supermarket Catalog</title>
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
    <script defer th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
</head>
<body>
<header class="site-header">
    <div class="site-header__inner">
        <a class="brand" th:href="@{/}">Demo Supermarket</a>
        <span class="tagline">Fresh groceries for pickup or delivery</span>
    </div>
</header>

<main class="catalog-shell">
    <section class="catalog-heading" aria-labelledby="catalog-title">
        <div>
            <h1 id="catalog-title">Product catalog</h1>
            <p>Browse active supermarket products by category or search the list.</p>
        </div>
        <form class="search-form" th:action="@{/products}" method="get">
            <input
                type="hidden"
                name="category"
                th:if="${selectedCategoryId != null}"
                th:value="${selectedCategoryId}">
            <label for="catalog-search">Search products</label>
            <div class="search-form__controls">
                <input
                    id="catalog-search"
                    name="q"
                    type="search"
                    placeholder="Search by name or description"
                    th:value="${query}">
                <button type="submit">Search</button>
            </div>
        </form>
    </section>

    <nav class="category-filter" aria-label="Product categories">
        <a
            th:href="@{/products(q=${query})}"
            th:classappend="${selectedCategoryId == null} ? ' category-filter__link--active' : ''"
            class="category-filter__link">All</a>
        <a
            th:each="category : ${categories}"
            th:href="@{/products(category=${category.id}, q=${query})}"
            th:text="${category.name}"
            th:classappend="${selectedCategoryId == category.id} ? ' category-filter__link--active' : ''"
            class="category-filter__link">Category</a>
    </nav>

    <section class="product-grid" aria-label="Products" th:if="${!products.isEmpty()}">
        <article class="product-card" th:each="product : ${products}">
            <div class="product-card__image">
                <img
                    th:if="${product.imagePath != null && !product.imagePath.isBlank()}"
                    th:src="@{${product.imagePath}}"
                    th:alt="${product.name}">
                <span
                    th:unless="${product.imagePath != null && !product.imagePath.isBlank()}"
                    aria-hidden="true">Fresh</span>
            </div>
            <div class="product-card__body">
                <div class="product-card__meta">
                    <span th:text="${product.category.name}">Category</span>
                    <span th:text="${product.unitLabel}">Unit</span>
                </div>
                <h2 th:text="${product.name}">Product name</h2>
                <p th:text="${product.description}">Product description</p>
                <strong
                    class="product-card__price"
                    th:text="'€' + ${#numbers.formatDecimal(product.unitPrice, 1, 2)}">€0.00</strong>
                <form th:action="@{/cart/start}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <button class="product-card__button" type="submit">Add to cart</button>
                </form>
            </div>
        </article>
    </section>

    <section class="empty-state" th:if="${products.isEmpty()}">
        <h2>No products found</h2>
        <p>Try a different search term or category.</p>
    </section>
</main>
</body>
</html>
