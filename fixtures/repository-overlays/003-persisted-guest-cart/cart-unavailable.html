<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart unavailable | Demo Supermarket</title>
    <link rel="stylesheet" th:href="@{/css/catalog.css}">
</head>
<body>
<header class="site-header">
    <div class="site-header__inner">
        <a class="brand" th:href="@{/}">Demo Supermarket</a>
        <a class="header-link" th:href="@{/products}">Product catalog</a>
    </div>
</header>

<main class="catalog-shell">
    <section class="empty-state">
        <h1 th:text="${message}">This cart is not available.</h1>
        <p>The cart token may be incorrect, expired, or no longer active.</p>
    </section>
</main>
</body>
</html>
