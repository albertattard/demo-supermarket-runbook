name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Oracle Java 25
        uses: oracle-actions/setup-java@v1
        with:
          website: oracle.com
          release: 25

      - name: Verify
        run: ./mvnw verify
