  - type: Command
    commands: |
      gh pr create \
        --title 'Implement persisted guest carts' \
        --body-file '../fixtures/pr/003-persisted-guest-cart.md' \
      > '../fixtures/pr/003-persisted-guest-cart.out'

  - type: Markdown
